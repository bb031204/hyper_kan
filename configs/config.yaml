# ========================================
# HyperGKAN Configuration File
# 基于论文: Hypergraph Kolmogorov–Arnold Networks for Station-Level Meteorological Forecasting
# ========================================

# 🔥 数据集选择（严格互斥：每次只能有一个为 true）
# 选择后，数据路径、预处理策略、超图K值、输出维度均会自动适配
dataset_selection:
  Temperature: false    # 温度 (K→°C, output_dim=1, K=3)
  Cloud: false        # 云量 (fraction [0,1], output_dim=1, K=3)
  Humidity: true    # 湿度 (%, output_dim=1, K=2, 论文Section 4.4)
  Wind: false         # 风速 (m/s, u+v分量, output_dim=2, K=3)

# 元数据配置（element 和 experiment_name 由 dataset_selection 自动决定）
meta:
  experiment_name: "HyperGKAN_Temperature"  # 由 dataset_selection 自动覆盖
  element: "Temperature"                     # 由 dataset_selection 自动覆盖
  device: "cuda"  # cuda / cpu
  seed: 42
  num_workers: 0  # Windows上设为0避免多进程问题

# 数据配置
data:
  # 数据路径 - 由 dataset_selection 自动设置，以下为默认值/向后兼容
  train_path: "D:/bishe/WYB/temperature/trn.pkl"
  val_path: "D:/bishe/WYB/temperature/val.pkl"
  test_path: "D:/bishe/WYB/temperature/test.pkl"
  position_path: "D:/bishe/WYB/temperature/position.pkl"

  # 数据预处理
  use_context: true  # 是否使用context特征
  context_dim: 8     # ✅ 论文推荐：7维（年月日时+海拔纬度经度），use_dim4=true时为8维
  use_dim4: true     # ✅ 启用区域标志（论文已验证为气候区域标志，对预测有帮助）
  
  # 🔥 Context特征选择（8个特征的独立开关）
  # 这些特征将与数据集特征拼接后参与训练
  # True: 使用该特征; False: 不使用该特征
  context_features:
    use_longitude: true    # 经度
    use_latitude: true     # 纬度
    use_altitude: true     # 海拔
    use_year: true         # 年份
    use_month: true        # 月份
    use_day: true          # 日期
    use_hour: true         # 小时
    use_region: false      # 区域标志（气候区域）

  # 以下预处理参数由 dataset_selection 自动覆盖，也可手动指定
  normalize: true
  scaler_type: "standard"  # standard / minmax
  kelvin_to_celsius: true  # 仅Temperature生效，其他要素自动设为false

  # 时间窗口
  input_window: 12   # 输入时间步 (12小时)
  output_window: 12  # 预测时间步 (12小时)

  # 🔥 站点采样 (空间维度采样)
  # 从所有站点中随机选择指定数量的站点进行训练
  # - 每个站点仍保持完整的时间序列(12帧)
  # - 不影响时序特征提取
  # - 采样越少，训练越快，但可能降低预测精度
  num_stations: 768  # null=使用全部站点(2048), 或设置如 512, 1024

  # 🔥 样本采样 (样本维度采样，按比例)
  # 从训练/验证/测试集中按比例随机选择样本
  # - 与站点采样不同，这是在样本数量维度采样
  # - 每个样本仍包含所有站点（或采样后的站点）
  # - 可用于快速实验和调试
  # - 例如: sample_ratio=0.5 表示使用50%的样本
  train_sample_ratio: 0.4   # 1.0=使用全部训练样本, 0.5=使用50%
  val_sample_ratio: 1.0     # 1.0=使用全部验证样本, 0.5=使用50%
  test_sample_ratio: 1.0    # 1.0=使用全部测试样本, 0.5=使用50%

  # 数据集分割 (如果pkl未预分割)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

  # Batch配置
  batch_size: 16  # 🔥 极限优化：降至1 (通过梯度累积保持有效batch_size=16)
  shuffle_train: true

# 超图构建配置
graph:
  # 缓存路径
  cache_dir: "data/cache"
  use_cache: true
  
  # 可视化配置
  visualize: true  # 是否可视化超图结构
  visual_dir: "visuals"  # 可视化文件保存目录
  
  # 邻域超图 (Neighbourhood Hypergraph)
  neighbourhood:
    method: "knn"  # knn / radius
    top_k: 3       # 由 dataset_selection 自动覆盖 (Humidity=2, 其他=3, 论文Figure 3)
    use_geodesic: true  # 使用球面距离 (Haversine)
    weight_decay: 0.1   # 超边权重衰减
  
  # 语义超图 (Semantic Hypergraph)
  semantic:
    similarity: "euclidean"  # euclidean / pearson / cosine
    top_k: 3                 # 由 dataset_selection 自动覆盖 (Humidity=2, 其他=3)
    input_window: 12         # 用于计算相似度的历史窗口
    normalize_features: true # 计算相似度前标准化
  
  # 超图卷积配置
  conv:
    hidden_channels: 16  # 🔥 降低至16以节省显存
    num_layers: 2        # 超图卷积层数
    dropout: 0.15
    activation: "silu"   # silu / relu / gelu (论文使用SiLU)
    memory_efficient: true  # 🔥 按时间步循环处理，节省显存（推荐对2048站点启用）
    # 数值稳定性参数 — 由 dataset_selection 自动覆盖 (element_settings.py)
    float32_norm: true     # 超图归一化矩阵强制使用float32 (AMP安全)
    degree_clamp_min: 1.0e-6  # 节点度下界 (防止零度节点导致 Inf/NaN)

# 模型配置
model:
  # 输入投影
  input_projection:
    d_model: 16  # 🔥 降低至16以极限节省显存
  
  # KAN配置 (核心创新)
  kan:
    use_kan: true      # true: 使用KAN; false: 使用MLP
    grid_size: 3        # 降低至3以节省显存 (原5)
    spline_order: 3     # 样条阶数
    noise_scale: 0.1
    base_activation: "silu"
    
    # ⚡ KAN分块处理（显存与速度权衡）
    # ┌────────┬──────────────┬──────────┬─────────────┐
    # │ chunks │ 调用方式      │ 显存占用  │ 速度影响    │
    # ├────────┼──────────────┼──────────┼─────────────┤
    # │   1    │ 一次性处理    │ 100%     │ 基准(最快)   │
    # │   2    │ 分2次调用     │ ~60%     │ +10%        │
    # │   4    │ 分4次调用     │ ~40%     │ +20%        │
    # │  12    │ 按时间步循环  │ ~25%     │ +100%(慢1倍) │
    # └────────┴──────────────┴──────────┴─────────────┘
    chunks: 1  # 🔥 推荐12以最大化节省显存（不影响训练质量）
    
  # HyperGKAN Layer配置
  hypergkan_layer:
    d_model: 16          # 🔥 降低至16以极限节省显存
    num_layers: 1        # 🔥 减少至1层
    dropout: 0.15
    fusion_method: "add"  # 🔥 改为add以节省显存 (concat会双倍特征)
  
  # 时序模块 (GRU Encoder-Decoder)
  temporal:
    type: "gru"           # gru / lstm
    hidden_size: 16       # 🔥 降低至16以极限节省显存
    num_layers: 1         # 🔥 减少至1层
    dropout: 0.15
    bidirectional: false
  
  # 输出投影
  output_projection:
    output_dim: 1  # 由 dataset_selection 自动覆盖 (Wind=2, 其他=1)

# 训练配置
training:
  # 定时暂停 (可选)
  time_limit_minutes: null  # 训练时间限制(分钟), null表示无限制, 例如: 100
  
  # 优化器 (论文使用Adam)
  optimizer:
    type: "adam"  # adam / adamw
    lr: 0.01      # 论文使用0.01
    weight_decay: 1.0e-5
    betas: [0.9, 0.999]
  
  # 学习率调度器
  scheduler:
    type: "reduce_on_plateau"  # reduce_on_plateau / cosine / step
    mode: "min"
    factor: 0.5
    patience: 10
    min_lr: 1.0e-6
  
  # 损失函数 (论文使用MAE)
  loss:
    type: "mae"  # mae / mse / huber
  
  # 训练策略
  epochs: 100   #500
  early_stopping:
    patience: 10  # 论文使用35
    min_delta: 1.0e-6
  
  # 梯度处理
  grad_clip: 5.0
  
  # AMP混合精度训练
  use_amp: true
  
  # 梯度累积 (增加至16以弥补batch_size降低, 保持有效batch_size=16)
  accumulation_steps: 1  # 🔥 batch=1 × accum=16 = 有效batch=16
  
  # Checkpoint保存
  save_best_only: true
  save_interval: 1  # 每10个epoch保存一次
  
  # 验证频率
  val_interval: 1

# 评估配置
evaluation:
  metrics:
    - "mae"   # Mean Absolute Error (主要指标)
    - "rmse"  # Root Mean Squared Error
    - "mape"  # Mean Absolute Percentage Error
  
  # 是否生成预测可视化
  visualize: true
  num_samples: 5  # 可视化样本数量

# 输出配置
output:
  base_dir: "D:/bishe/code/hyper_kan/outputs"  # 绝对路径，避免路径混乱
  save_predictions: true
  save_model: true
  save_plots: true
  
  # 日志配置
  logging:
    level: "INFO"  # DEBUG / INFO / WARNING / ERROR
    console: true
    file: true

# 消融实验配置 (可选)
ablation:
  # 用于快速切换消融实验
  disable_neighbourhood: false  # w/o-Nei
  disable_semantic: false       # w/o-Sem
  disable_kan: false            # w/o-KAN (使用MLP)
  disable_fusion: false         # 不融合双超图

# 可复现性
reproducibility:
  deterministic: true
  benchmark: false
